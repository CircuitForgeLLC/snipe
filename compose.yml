services:
  api:
    build:
      context: ..
      dockerfile: snipe/Dockerfile
    ports:
      - "8510:8510"
    env_file: .env
    volumes:
      - ./data:/app/snipe/data

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "8509:80"
    restart: unless-stopped
    depends_on:
      - api

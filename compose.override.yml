services:
  api:
    build:
      context: ..
      dockerfile: snipe/Dockerfile
    network_mode: host
    volumes:
      - ../circuitforge-core:/app/circuitforge-core
      - ./api:/app/snipe/api
      - ./app:/app/snipe/app
      - ./data:/app/snipe/data
      - ./tests:/app/snipe/tests
    environment:
      - RELOAD=true

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    volumes:
      - ./web/src:/app/src  # not used at runtime but keeps override valid
